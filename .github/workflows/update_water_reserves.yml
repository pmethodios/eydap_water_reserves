name: Update water reserves

on:
  schedule:
    - cron: "0 9 * * 1-5"   # 12:00 GMT+3, Monday-Friday
  workflow_dispatch:

jobs:
  update-water-reserves:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests beautifulsoup4 lxml

      - name: Run update script
        run: python eydap_rss_downloader.py

      - name: Commit updated CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add water_reserves_latest.csv
          git diff --cached --quiet || git commit -m "Update water reserves latest CSV"
          git push