name: Update water reserves

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-water-reserves:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml

      - name: Run update script
        run: python eydap_rss_downloader.py

      - name: Commit updated CSVs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add water_reserves_latest.csv latest_day_compare.csv

          git diff --cached --quiet && exit 0

          git commit -m "Update water reserves CSV outputs"
          git pull --rebase origin main
          git push origin main